name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  link-issue:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: read
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const branch = pr.head.ref;
            const title = pr.title;
            const body = pr.body || '';

            const candidates = new Set();

            const branchPatterns = [
              /^(?:fix|feat|feature|chore|docs|refactor)[\/\-](\d+)/i,
              /(?:^|[-\/])(\d+)(?:[-\/]|$)/,
            ];
            for (const pattern of branchPatterns) {
              const m = branch.match(pattern);
              if (m) candidates.add(parseInt(m[1], 10));
            }

            const titleMatches = title.matchAll(/#(\d+)/g);
            for (const m of titleMatches) {
              candidates.add(parseInt(m[1], 10));
            }

            const verified = [];
            for (const n of candidates) {
              try {
                await github.rest.issues.get({ owner, repo, issue_number: n });
                verified.push(n);
              } catch (_) {
                // not a valid issue in this repo
              }
            }

            const toAppend = verified.filter(n => {
              return !new RegExp(`(?:closes?|fixes?|resolves?)\\s+#${n}`, 'i').test(body);
            });

            if (toAppend.length === 0 && verified.length === 0) {
              core.warning('No linked issue found. Please add "Closes #N" to the PR body manually.');
              return;
            }

            if (toAppend.length > 0) {
              const additions = toAppend.map(n => `Closes #${n}`).join('\n');
              const updatedBody = body ? `${body}\n${additions}` : additions;
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pr.number,
                body: updatedBody,
              });
            }
